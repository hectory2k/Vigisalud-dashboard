
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VigiSalud v3.5</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --done: #2aff8f;
    --text: #e8e8f0;
    --muted: #4a4a6a;
    --muted2: #6a6a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 20px 48px;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -20%;
    width: 70vw; height: 70vw;
    background: radial-gradient(circle, rgba(42,255,143,0.04) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 24px;
    animation: up 0.5s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--done);
    background: rgba(42,255,143,0.08);
    border: 1px solid rgba(42,255,143,0.2);
    border-radius: 99px;
    padding: 4px 10px;
    margin-bottom: 14px;
  }

  .badge::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--done);
    box-shadow: 0 0 6px rgba(42,255,143,0.8);
    animation: blink 2s ease infinite;
  }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .title span { color: var(--accent); }

  .meta {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.05em;
  }

  /* Summary strip */
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
    animation: up 0.4s 0.08s ease both;
  }

  .sum-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .sum-val {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .sum-label {
    font-size: 9px;
    color: var(--muted2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Chart section */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    animation: up 0.5s 0.2s ease both;
  }

  .chart-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text);
  }

  canvas {
    max-height: 250px;
  }

  /* Progress bar */
  .progress-section {
    animation: up 0.4s 0.5s ease both;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--done), var(--accent));
    border-radius: 99px;
    transition: width 1.4s cubic-bezier(.16,1,.3,1);
  }

  .progress-val {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--done);
  }

  .footnote {
    margin-top: 20px;
    font-size: 10px;
    color: var(--muted);
    font-style: italic;
    text-align: right;
    letter-spacing: 0.05em;
    animation: up 0.4s 0.55s ease both;
  }

  @keyframes up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">MVP lanzado</div>
    <div class="title">VigiSalud<br><span>v3.5</span></div>
    <div class="meta">Predicción de consultas · 7 días · MAE 7.5</div>
  </div>

  <div class="summary">
    <div class="sum-box">
      <div class="sum-val" id="maeVal">7.5</div>
      <div class="sum-label">MAE activo</div>
    </div>
    <div class="sum-box">
      <div class="sum-val" id="predCount">-</div>
      <div class="sum-label">Predicciones</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="chart-title">📈 Predicciones próximos 7 días</div>
    <canvas id="grafico"></canvas>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span style="font-size:10px;color:var(--muted2)">MVP → producción</span>
      <span class="progress-val" id="pval">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="pfill"></div>
    </div>
  </div>

  <div class="footnote">Licencia MIT · listo para iterar</div>

</div>

<script>
// ==================== CARGAR DATOS DE SUPABASE ====================
async function cargar() {
  const url = "https://qlbczflygozfvwyilhes.supabase.co/rest/v1/predicciones?select=*&order=fecha.asc";
  const apiKey = "<xOTQ1MH0.EiNp2HRocIqW4yStNxBoHgDN-EfFZvPv_Uc5ETo0wYg";
  
  const res = await fetch(url, {
    headers: { "apikey": apiKey, "Authorization": `Bearer ${apiKey}` }
  });
  
  const datos = await res.json();
  
  // Mostrar cantidad de predicciones
  document.getElementById('predCount').textContent = datos.length;
  
  // Agrupar por zona
  const zonas = [...new Set(datos.map(d => d.zona))];
  const fechas = [...new Set(datos.map(d => d.fecha))].sort();
  
  const colores = ['#e74c3c', '#3498db', '#2ecc71'];
  
  const datasets = zonas.map((zona, i) => ({
    label: zona,
    data: fechas.map(f => {
      const r = datos.find(d => d.fecha === f && d.zona === zona);
      return r ? r.consultas_predichas : 0;
    }),
    borderColor: colores[i],
    backgroundColor: colores[i] + '20',
    tension: 0.3,
    fill: true
  }));
  
  new Chart(document.getElementById('grafico'), {
    type: 'line',
    data: { labels: fechas, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: '#e8e8f0', font: { family: 'DM Mono', size: 10 } }
        }
      },
      scales: {
        x: {
          ticks: { color: '#6a6a8a', font: { size: 9 }, maxTicksLimit: 7 },
          grid: { color: '#1e1e2e' }
        },
        y: {
          ticks: { color: '#6a6a8a', font: { size: 9 } },
          grid: { color: '#1e1e2e' }
        }
      }
    }
  });
}

cargar();

// Animate progress to 100%
setTimeout(() => {
  document.getElementById('pfill').style.width = '100%';
  document.getElementById('pval').textContent = '100%';
}, 300);
</script>
</body>
</html>
