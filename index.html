<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VigiSalud v3.5</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --done: #2aff8f;
    --text: #e8e8f0;
    --muted: #4a4a6a;
    --muted2: #6a6a8a;
    --red: #ff4757;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 20px 48px;
  }
  .container { max-width: 600px; margin: 0 auto; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--done); background: rgba(42,255,143,0.08);
    border: 1px solid rgba(42,255,143,0.2); border-radius: 99px;
    padding: 4px 10px; margin-bottom: 14px;
  }
  .badge::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: var(--done); box-shadow: 0 0 6px rgba(42,255,143,0.8);
    animation: blink 2s ease infinite;
  }
  .title { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; }
  .title span { color: var(--accent); }
  .meta { margin-top: 10px; font-size: 11px; color: var(--muted2); margin-bottom: 16px; }
  .meta .updated { color: var(--done); }
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .sum-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .sum-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--accent); line-height: 1; }
  .sum-label { font-size: 9px; color: var(--muted2); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px; }
  .chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; position: relative; }
  .chart-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .chart-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(17,17,24,0.9); border-radius: 12px; z-index: 10; justify-content: center; align-items: center; flex-direction: column; gap: 12px; }
  canvas { max-height: 280px; width: 100% !important; }
  .table-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; color: var(--muted2); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 4px; border-bottom: 1px solid var(--border); }
  td { padding: 6px 4px; border-bottom: 1px solid var(--border); color: var(--text); }
  .alert-row td { color: var(--red); font-weight: 500; }
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; height: 20px; width: 80px; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .error-state { text-align: center; padding: 20px; color: var(--red); }
  .demo-badge { display: inline-block; background: rgba(255,71,87,0.15); color: var(--red); font-size: 8px; padding: 2px 8px; border-radius: 99px; margin-left: 8px; }
  .footnote { margin-top: 20px; font-size: 10px; color: var(--muted); font-style: italic; text-align: right; }
</style>
</head>
<body>
<div class="container">
<img src="logo.svg" alt="VigiSalud" style="width:64px;height:64px;margin-bottom:16px;">  
<div class="badge">MVP lanzado</div>
  <div class="title">VigiSalud<br><span>v3.5</span> <span class="demo-badge" id="demoBadge" style="display:none">DEMO</span></div>
  <div class="meta">
    Predicción de consultas · 7 días · MAE 7.5<br>
    <span class="updated" id="updated">Cargando...</span>
  </div>

  <div class="summary">
    <div class="sum-box"><div class="sum-val" id="predCount"><span class="skeleton"></span></div><div class="sum-label">Predicciones</div></div>
    <div class="sum-box"><div class="sum-val" id="alertCount"><span class="skeleton"></span></div><div class="sum-label">Alertas activas</div></div>
  </div>

  <div class="chart-section">
    <div class="chart-overlay" id="chartOverlay">
      <span style="font-size:24px">⏳</span>
      <span style="color:var(--muted2);font-size:11px">Cargando datos...</span>
    </div>
    <div class="chart-title">📈 Predicciones próximos 7 días</div>
    <canvas id="grafico"></canvas>
  </div>

  <div class="table-section">
    <div class="chart-title">📋 Datos</div>
    <table><thead><tr><th>Fecha</th><th>Zona</th><th>Consultas</th></tr></thead><tbody id="tableBody"></tbody></table>
  </div>

  <div class="footnote">Licencia MIT · <span id="countdown"></span></div>
</div>

<script>
const UMBRAL = { "Norte": 130, "Centro": 110, "Sur": 90 };
let usandoDemo = false;

function generarDatosDemo() {
  const zonas = ["Norte", "Centro", "Sur"];
  const datos = [];
  const hoy = new Date();
  for (let i = 1; i <= 7; i++) {
    const fecha = new Date(hoy);
    fecha.setDate(fecha.getDate() + i);
    const fechaStr = fecha.toISOString().split('T')[0];
    zonas.forEach(zona => {
      const base = zona === "Norte" ? 130 : zona === "Centro" ? 110 : 90;
      datos.push({
        fecha: fechaStr,
        zona: zona,
        consultas_predichas: base + Math.floor(Math.random() * 20 - 10)
      });
    });
  }
  return datos;
}

function actualizarUI(datos) {
  // Limpiar overlay SIEMPRE
  document.getElementById('chartOverlay').style.display = 'none';
  
  if (usandoDemo) document.getElementById('demoBadge').style.display = 'inline-block';
  
  const now = new Date();
  document.getElementById('updated').textContent = 
    `Actualizado: ${now.toLocaleDateString('es-AR')} ${now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
  
  document.getElementById('predCount').textContent = datos.length;
  let alertas = 0;
  datos.forEach(d => { if (d.consultas_predichas > (UMBRAL[d.zona]||100)) alertas++; });
  document.getElementById('alertCount').textContent = alertas;
  
  // Tabla
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  datos.slice(-21).forEach(d => {
    const tr = document.createElement('tr');
    const enAlerta = d.consultas_predichas > (UMBRAL[d.zona]||100);
    if (enAlerta) tr.className = 'alert-row';
    tr.innerHTML = `<td>${d.fecha}</td><td>${d.zona}</td><td>${d.consultas_predichas} ${enAlerta?'⚠️':''}</td>`;
    tbody.appendChild(tr);
  });
  
  // Gráfico
  const fechas = [...new Set(datos.map(d => d.fecha))].sort();
  const zonas = [...new Set(datos.map(d => d.zona))];
  const colores = ['#2aff8f', '#3498db', '#e8ff47'];
  
  const oldChart = Chart.getChart('grafico');
  if (oldChart) oldChart.destroy();
  
  const datasets = zonas.map((zona, i) => ({
    label: zona,
    data: fechas.map(f => {
      const r = datos.find(d => d.fecha === f && d.zona === zona);
      return r ? r.consultas_predichas : null;
    }),
    borderColor: colores[i], backgroundColor: colores[i]+'20',
    tension: 0.3, fill: false, pointRadius: 4
  }));
  
  new Chart(document.getElementById('grafico'), {
    type: 'line',
    data: { labels: fechas, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#e8e8f0', font: { family: 'DM Mono', size: 10 }, usePointStyle: true } },
        tooltip: {
          backgroundColor: '#111118', titleColor: '#e8ff47', bodyColor: '#e8e8f0',
          borderColor: '#1e1e2e', borderWidth: 1,
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} consultas ${ctx.parsed.y>(UMBRAL[ctx.dataset.label]||100)?'⚠️':''}`
          }
        }
      },
      scales: {
        x: { ticks: { color: '#6a6a8a', font: { size: 9 } }, grid: { color: '#1e1e2e' } },
        y: { ticks: { color: '#6a6a8a', font: { size: 9 } }, grid: { color: '#1e1e2e' } }
      }
    }
  });
}

async function fetchConTimeout(url, options, timeoutMs = 6000) {
  return new Promise((resolve, reject) => {
    let cumplido = false;
    const timer = setTimeout(() => {
      if (!cumplido) { cumplido = true; reject(new Error('timeout')); }
    }, timeoutMs);
    fetch(url, options)
      .then(r => { if (!cumplido) { cumplido = true; clearTimeout(timer); resolve(r); } })
      .catch(e => { if (!cumplido) { cumplido = true; clearTimeout(timer); reject(e); } });
  });
}

async function cargar() {
  document.getElementById('chartOverlay').style.display = 'flex';
  
  const url = "https://qlbczflygozfvwyilhes.supabase.co/rest/v1/predicciones?select=*&order=fecha.asc&limit=50";
  const apiKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsYmN6Zmx5Z296ZnZ3eWlsaGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDM0NTAsImV4cCI6MjA5NDUxOTQ1MH0.EiNp2HRocIqW4yStNxBoHgDN-EfFZvPv_Uc5ETo0wYg";
  
  try {
    const res = await fetchConTimeout(url, {
      headers: { "apikey": apiKey, "Authorization": `Bearer ${apiKey}` }
    }, 6000);
    
    if (!res.ok) throw new Error("HTTP " + res.status);
    const datos = await res.json();
    if (!datos || !datos.length) throw new Error("Sin datos");
    
    usandoDemo = false;
    actualizarUI(datos);
  } catch(e) {
    console.warn("Usando datos demo:", e.message);
    usandoDemo = true;
    actualizarUI(generarDatosDemo());
  }
}

// Auto-refresh cada 30 min
let segundos = 1800;
function countdown() {
  const min = Math.floor(segundos/60), sec = segundos%60;
  document.getElementById('countdown').textContent = `Próxima actualización: ${min}:${sec.toString().padStart(2,'0')}`;
  segundos--;
  if (segundos < 0) { cargar(); segundos = 1800; }
}

cargar();
setInterval(countdown, 1000);
</script>
</body>
</html>
